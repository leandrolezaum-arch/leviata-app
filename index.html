<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>LEVIATÃ Clinical</title>
    <style>body { background: #0f172a; color: white; }</style>
</head>
<body class="p-6 flex flex-col items-center">
    <h1 class="text-4xl font-bold text-cyan-400 italic mb-2">LEVIATÃ</h1>
    <p class="text-slate-500 text-xs tracking-widest mb-8">UNIVERSAL CLINICAL PIPELINE</p>

    <div class="w-full max-w-md bg-slate-800 p-6 rounded-3xl shadow-xl space-y-4">
        <input id="projeto" type="text" value="PROJETO_ALPHA" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700">
        <select id="rota" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700">
            <option value="systemic">Systemic</option>
            <option value="cns">CNS</option>
        </select>
        <textarea id="alvo" placeholder="SEQUÊNCIA ALVO" class="w-full bg-slate-900 p-3 rounded-xl h-24 uppercase"></textarea>
        <button onclick="rodar()" id="btn" class="w-full bg-cyan-600 p-4 rounded-xl font-bold hover:bg-cyan-500">INICIAR MOTOR</button>
        
        <div id="loading" class="hidden text-center text-cyan-400 animate-pulse text-xs">EVOLUINDO...</div>
        <div id="res" class="mt-6 space-y-4"></div>
    </div>

    <script>
        async function rodar() {
            const resDiv = document.getElementById('res');
            const btn = document.getElementById('btn');
            resDiv.innerHTML = '';
            document.getElementById('loading').classList.remove('hidden');

            try {
                const response = await fetch('http://localhost:8000/api/v1/descobrir', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        projeto: document.getElementById('projeto').value,
                        sequencia_custom: document.getElementById('alvo').value,
                        rota: document.getElementById('rota').value
                    })
                });
                const data = await response.json();

                // Card de Economia
                resDiv.innerHTML = `
                    <div class="bg-emerald-900/30 border border-emerald-500/50 p-4 rounded-2xl">
                        <p class="text-[10px] text-emerald-400 font-bold">ECONOMIA ESTIMADA</p>
                        <p class="text-2xl font-bold text-emerald-400">${data.economia.valor}</p>
                        <p class="text-xs text-cyan-400">${data.economia.tempo} evitadas</p>
                    </div>
                `;

                // Cards de Ranking
                data.ranking.forEach(item => {
                    resDiv.innerHTML += `
                        <div class="bg-slate-900 p-4 rounded-2xl border-l-4 border-cyan-500">
                            <div class="flex justify-between text-[10px] mb-2">
                                <span class="font-bold text-cyan-400">RANK #${item.rank}</span>
                                <span class="text-slate-500">SHANNON-MODEL</span>
                            </div>
                            <div class="font-mono text-emerald-300 font-bold mb-3 break-all">${item.sequencia}</div>
                            <div class="grid grid-cols-3 gap-2 text-[10px] text-center">
                                <div><p class="text-slate-500">ENTROPIA</p><p class="font-bold">${item.entropia}</p></div>
                                <div><p class="text-slate-500">LOGP</p><p class="font-bold">${item.logp}</p></div>
                                <div><p class="text-slate-500">VIDA</p><p class="font-bold text-cyan-400">${item.vida}</p></div>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                resDiv.innerHTML = '<p class="text-red-400">Erro de conexão.</p>';
            }
            document.getElementById('loading').classList.add('hidden');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leviatã Clinical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>

<body class="p-4 flex flex-col items-center min-h-screen font-sans">

<header class="text-center my-6">
    <h1 class="text-3xl font-bold text-cyan-400 uppercase tracking-tighter italic">LEVIATÃ</h1>
    <p class="text-slate-400 text-[10px] tracking-[0.3em] uppercase font-bold">
        Universal Clinical Pipeline
    </p>
</header>

<main class="w-full max-w-md glass p-6 rounded-2xl shadow-2xl border border-slate-700">

    <div class="space-y-4 mb-6">

        <div>
            <label class="block text-[10px] uppercase tracking-widest mb-1 text-cyan-300 font-bold opacity-70">
                Projeto
            </label>
            <input id="projeto" type="text" value="PROJETO_ALPHA"
                class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white font-mono text-sm">
        </div>

        <div>
            <label class="block text-[10px] uppercase tracking-widest mb-1 text-cyan-300 font-bold opacity-70">
                Rota
            </label>
            <select id="rota"
                class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white text-sm">
                <option value="systemic">Systemic</option>
                <option value="cns">CNS</option>
                <option value="intracellular">Intracellular</option>
            </select>
        </div>

        <div>
            <label class="block text-[10px] uppercase tracking-widest mb-1 text-cyan-300 font-bold opacity-70">
                Sequência alvo
            </label>
            <textarea id="sequencia"
                class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white font-mono text-sm h-24 uppercase resize-none"></textarea>
        </div>

    </div>

    <button onclick="analisar()" id="btn"
        class="w-full bg-cyan-600 hover:bg-cyan-500 py-4 rounded-xl font-black uppercase tracking-widest text-sm">
        Iniciar Motor Genético
    </button>

    <div id="loading" class="hidden mt-6 text-center">
        <div class="inline-block animate-spin rounded-full h-4 w-4 border-t-2 border-cyan-400"></div>
        <span class="text-cyan-400 text-[10px] uppercase font-bold">
            Evoluindo...
        </span>
    </div>

    <div id="resultados" class="mt-8 space-y-4"></div>

</main>

<script>
function getEnergyColor(e) {
    if (e < 5) return "text-emerald-400";
    if (e < 10) return "text-yellow-400";
    return "text-red-400";
}

function getEnergyBar(e) {
    if (e < 5) return "bg-emerald-400";
    if (e < 10) return "bg-yellow-400";
    return "bg-red-500";
}

async function analisar() {

    const btn = document.getElementById('btn');
    const resDiv = document.getElementById('resultados');
    const loading = document.getElementById('loading');

    const seq = document.getElementById('sequencia').value;
    const rota = document.getElementById('rota').value;

    if (!seq) {
        alert("Insira o alvo!");
        return;
    }

    btn.disabled = true;
    loading.classList.remove('hidden');
    resDiv.innerHTML = '';

    try {

        const response = await fetch('https://leviata-api.vercel.app/api/v1/descobrir', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                projeto: document.getElementById('projeto').value,
                sequencia_custom: seq.toUpperCase(),
                rota: rota
            })
        });

        const data = await response.json();

        data.resultados.forEach(res => {

            const energia = res.energia ?? 0;

            const card = document.createElement('div');
            card.className = 'glass p-4 rounded-xl border-l-4 border-emerald-500 animate-fadeIn';

            card.innerHTML = `
                <div class="flex flex-col gap-3">

                    <div class="flex justify-between">
                        <span class="text-[9px] bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded font-black">
                            Rank #${res.rank}
                        </span>
                        <span class="text-[9px] text-slate-500 font-mono italic">
                            Energy-aware
                        </span>
                    </div>

                    <div class="font-mono text-sm text-emerald-400 font-bold break-all">
                        ${res.seq || res.sequencia_candidata}
                    </div>

                    <!-- Barra de energia -->
                    <div class="w-full h-1 bg-slate-800 rounded overflow-hidden">
                        <div style="width:${Math.min(energia * 5, 100)}%"
                             class="h-full ${getEnergyBar(energia)} transition-all"></div>
                    </div>

                    <div class="flex justify-between border-t border-slate-800 pt-3 text-xs font-mono">

                        <div>
                            <div class="text-[8px] text-slate-500 uppercase">Energia</div>
                            <div class="font-bold ${getEnergyColor(energia)}">${energia}</div>
                        </div>

                        <div>
                            <div class="text-[8px] text-slate-500 uppercase">LogP</div>
                            <div>${res.logP ?? res.logp_predito}</div>
                        </div>

                        <div>
                            <div class="text-[8px] text-slate-500 uppercase">Meia-vida</div>
                            <div class="text-cyan-400">${res.half_life ?? res.meia_vida}h</div>
                        </div>

                        <div>
                            <div class="text-[8px] text-slate-500 uppercase">Tox</div>
                            <div class="text-red-400">${res.tox ?? res.tox_hemolise}</div>
                        </div>

                    </div>

                </div>
            `;

            resDiv.appendChild(card);
        });

    } catch (e) {
        alert("Erro: API offline");
    }

    btn.disabled = false;
    loading.classList.add('hidden');
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leviatã Clinical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">
    <header class="text-center my-6">
        <h1 class="text-3xl font-bold text-cyan-400 uppercase tracking-tighter italic">LEVIATÃ</h1>
        <p class="text-slate-400 text-[10px] tracking-[0.3em] uppercase font-bold">Universal Clinical Pipeline</p>
    </header>

    <main class="w-full max-w-md glass p-6 rounded-2xl shadow-2xl border border-slate-700">
        <div class="space-y-4 mb-6">
            <div>
                <label class="block text-[10px] uppercase tracking-widest mb-1 text-cyan-300 font-bold opacity-70">Identificação do Projeto</label>
                <input id="projeto" type="text" value="PROJETO_ALPHA" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 focus:outline-none focus:border-cyan-500 text-white font-mono text-sm">
            </div>

            <div>
                <label class="block text-[10px] uppercase tracking-widest mb-1 text-cyan-300 font-bold opacity-70">Sequência da Doença (Alvo)</label>
                <textarea id="sequencia" placeholder="Insira a sequência do patógeno..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 focus:outline-none focus:border-cyan-500 text-white font-mono text-sm h-24 uppercase resize-none"></textarea>
            </div>
        </div>

        <button onclick="analisar()" id="btn" class="w-full bg-cyan-600 hover:bg-cyan-500 active:scale-95 transition-all font-black py-4 rounded-xl shadow-lg uppercase tracking-widest text-sm">
            Iniciar Motor Genético
        </button>

        <div id="loading" class="hidden mt-6 text-center">
            <div class="inline-block animate-spin rounded-full h-4 w-4 border-t-2 border-cyan-400 mr-2"></div>
            <span class="text-cyan-400 animate-pulse text-[10px] uppercase font-bold italic">Evoluindo População de Peptídeos...</span>
        </div>
        
        <div id="resultados" class="mt-8 space-y-4"></div>
    </main>

    <script>
        async function analisar() {
            const btn = document.getElementById('btn');
            const resDiv = document.getElementById('resultados');
            const loading = document.getElementById('loading');
            const seqInput = document.getElementById('sequencia').value;
            
            if(!seqInput) { alert("Insira o alvo biológico!"); return; }

            btn.disabled = true;
            btn.style.opacity = '0.5';
            loading.classList.remove('hidden');
            resDiv.innerHTML = '';

            try {
                const response = await fetch('https://leviata-api.vercel.app/api/v1/descobrir', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        projeto: document.getElementById('projeto').value,
                        sequencia_custom: seqInput.toUpperCase(),
                        rota: "systemic" // Pode mudar para cns ou intracellular depois
                    })
                });

                const data = await response.json();
                
                data.resultados.forEach(res => {
                    const card = document.createElement('div');
                    card.className = 'glass p-4 rounded-xl border-l-4 border-emerald-500 animate-fadeIn';
                    card.innerHTML = `
                        <div class="flex flex-col gap-3">
                            <div class="flex justify-between items-start">
                                <span class="text-[9px] bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded font-black uppercase">Rank #${res.rank}</span>
                                <span class="text-[9px] text-slate-500 font-mono italic">Fitness Optimized</span>
                            </div>
                            <div class="font-mono text-sm text-emerald-400 font-bold tracking-widest break-all leading-relaxed">
                                ${res.sequencia_candidata}
                            </div>
                            <div class="flex justify-between items-end border-t border-slate-800 pt-3 text-right font-mono">
                                <div>
                                    <div class="text-[8px] text-slate-500 uppercase font-black text-left">LogP</div>
                                    <div class="text-xs font-bold text-slate-200 text-left">${res.logp_predito}</div>
                                </div>
                                <div>
                                    <div class="text-[8px] text-slate-500 uppercase font-black">Meia-Vida</div>
                                    <div class="text-xs font-bold text-cyan-400">${res.meia_vida}h</div>
                                </div>
                                <div>
                                    <div class="text-[8px] text-slate-500 uppercase font-black">Tox</div>
                                    <div class="text-xs font-bold text-red-400">${res.tox_hemolise}</div>
                                </div>
                            </div>
                        </div>
                    `;
                    resDiv.appendChild(card);
                });
            } catch (e) {
                alert('Erro Crítico: Motor Genético Offline.');
            } finally {
                btn.disabled = false;
                btn.style.opacity = '1';
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>

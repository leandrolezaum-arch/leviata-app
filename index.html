<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leviatã Clinical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>

<body class="p-4 flex flex-col items-center min-h-screen font-sans">

<header class="text-center my-6">
    <h1 class="text-3xl font-bold text-cyan-400 uppercase tracking-tighter italic">LEVIATÃ</h1>
    <p class="text-slate-400 text-[10px] tracking-[0.3em] uppercase font-bold">
        Universal Clinical Pipeline
    </p>
</header>

<main class="w-full max-w-md glass p-6 rounded-2xl shadow-2xl border border-slate-700">

    <div class="space-y-4 mb-6">

        <div>
            <label class="block text-[10px] uppercase tracking-widest mb-1 text-cyan-300 font-bold opacity-70">
                Projeto
            </label>
            <input id="projeto" type="text" value="PROJETO_ALPHA"
                class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white font-mono text-sm">
        </div>

        <div>
            <label class="block text-[10px] uppercase tracking-widest mb-1 text-cyan-300 font-bold opacity-70">
                Rota
            </label>
            <select id="rota"
                class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white text-sm">
                <option value="systemic">Systemic</option>
                <option value="cns">CNS</option>
                <option value="intracellular">Intracellular</option>
            </select>
        </div>

        <div>
            <label class="block text-[10px] uppercase tracking-widest mb-1 text-cyan-300 font-bold opacity-70">
                Sequência alvo
            </label>
            <textarea id="sequencia"
                class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white font-mono text-sm h-24 uppercase resize-none"></textarea>
        </div>

    </div>

    <button onclick="analisar()" id="btn"
        class="w-full bg-cyan-600 hover:bg-cyan-500 py-4 rounded-xl font-black uppercase tracking-widest text-sm">
        Iniciar Motor Genético
    </button>

    <div id="loading" class="hidden mt-6 text-center">
        <div class="inline-block animate-spin rounded-full h-4 w-4 border-t-2 border-cyan-400"></div>
        <span class="text-cyan-400 text-[10px] uppercase font-bold">
            Evoluindo o Leviatã...
        </span>
    </div>

    <div id="resultados" class="mt-8 space-y-6"></div>

</main>

<script>
function getEnergyColor(e) {
    if (e < 5) return "text-emerald-400";
    if (e < 10) return "text-yellow-400";
    return "text-red-400";
}

async function analisar() {

    const btn = document.getElementById('btn');
    const resDiv = document.getElementById('resultados');
    const loading = document.getElementById('loading');

    const seq = document.getElementById('sequencia').value.trim();
    const rota = document.getElementById('rota').value;

    if (!seq) {
        alert("Insira a sequência alvo!");
        return;
    }

    btn.disabled = true;
    loading.classList.remove('hidden');
    resDiv.innerHTML = '';

    try {
        const response = await fetch('https://leviata-api.vercel.app/api/v1/descobrir', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                projeto: document.getElementById('projeto').value,
                sequencia_custom: seq.toUpperCase(),
                rota: rota
            })
        });

        const data = await response.json();

        // === RELATÓRIO DE ECONOMIA ===
        const eco = data.relatorio_economia;
        const ecoHTML = `
            <div class="glass p-5 rounded-2xl border border-emerald-500/30 animate-fadeIn">
                <div class="flex items-center gap-2 mb-4">
                    <span class="text-emerald-400 text-xl">💰</span>
                    <h2 class="text-lg font-bold text-emerald-400">ECONOMIA GERADA</h2>
                </div>
                <div class="grid grid-cols-2 gap-4 text-sm">
                    <div>
                        <p class="text-[10px] text-slate-400">CUSTO EM SÍNTESE EVITADO</p>
                        <p class="text-2xl font-bold text-emerald-400">
                            R$ ${eco.resumo_economia.custo_sintese_evitado_min.toLocaleString('pt-BR')} – 
                            R$ ${eco.resumo_economia.custo_sintese_evitado_max.toLocaleString('pt-BR')}
                        </p>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400">TEMPO EVITADO</p>
                        <p class="text-2xl font-bold text-cyan-400">
                            ${eco.resumo_economia.tempo_evitado_semanas} semanas
                        </p>
                        <p class="text-xs text-emerald-400">${eco.resumo_economia.reducao_percent}% de redução</p>
                    </div>
                </div>
                <div class="mt-4 text-[10px] text-slate-400 border-t border-slate-700 pt-3">
                    ${eco.recomendacao}
                </div>
            </div>
        `;

        resDiv.innerHTML += ecoHTML;

        // === CANDIDATOS ===
        data.resultados.forEach(res => {
            const energia = res.energia ?? 0;

            const card = document.createElement('div');
            card.className = 'glass p-5 rounded-2xl border-l-4 border-cyan-400 animate-fadeIn';
            card.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <span class="text-[10px] bg-cyan-500/20 text-cyan-400 px-3 py-1 rounded-full font-black">
                        Rank #${res.rank}
                    </span>
                    <span class="text-[10px] text-slate-500 font-mono">Energy-aware</span>
                </div>

                <div class="font-mono text-base text-emerald-300 font-bold break-all leading-tight mb-4">
                    ${res.sequencia_candidata}
                </div>

                <div class="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden mb-4">
                    <div style="width: ${Math.min(energia * 6, 100)}%" 
                         class="h-full bg-gradient-to-r from-emerald-400 to-cyan-400 transition-all"></div>
                </div>

                <div class="grid grid-cols-4 gap-2 text-center text-xs font-mono">
                    <div>
                        <div class="text-slate-400">Energia</div>
                        <div class="\( {getEnergyColor(energia)} font-bold"> \){energia}</div>
                    </div>
                    <div>
                        <div class="text-slate-400">LogP</div>
                        <div class="text-white">${res.logp_predito}</div>
                    </div>
                    <div>
                        <div class="text-slate-400">Meia-vida</div>
                        <div class="text-cyan-400">${res.meia_vida}</div>
                    </div>
                    <div>
                        <div class="text-slate-400">Tox</div>
                        <div class="text-red-400">${res.tox_hemolise}</div>
                    </div>
                </div>
            `;
            resDiv.appendChild(card);
        });

    } catch (e) {
        resDiv.innerHTML = `<p class="text-red-400 text-center">Erro ao conectar com o Motor Genético.</p>`;
    }

    btn.disabled = false;
    loading.classList.add('hidden');
}
</script>

</body>
</html>

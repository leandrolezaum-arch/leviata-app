<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>LEVIATÃ Pipeline</title>
</head>
<body class="bg-slate-950 text-white p-4 font-sans">
    <div class="max-w-md mx-auto">
        <header class="text-center py-6">
            <h1 class="text-4xl font-black text-cyan-400 italic">LEVIATÃ</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.4em]">Universal Clinical Pipeline</p>
        </header>

        <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-2xl space-y-4">
            <input id="proj" type="text" value="PROJETO_ALPHA" class="w-full bg-black/50 p-3 rounded-xl border border-slate-700 text-sm">
            
            <select id="rota" class="w-full bg-black/50 p-3 rounded-xl border border-slate-700 text-sm">
                <option value="systemic">Systemic</option>
                <option value="cns">CNS</option>
            </select>

            <textarea id="alvo" placeholder="COLE A SEQUÊNCIA ALVO AQUI" class="w-full bg-black/50 p-3 rounded-xl border border-slate-700 h-24 font-mono text-xs uppercase"></textarea>
            
            <button onclick="executar()" id="btn" class="w-full bg-cyan-600 hover:bg-cyan-500 p-4 rounded-2xl font-bold uppercase tracking-widest transition-all">
                Iniciar Motor Genético
            </button>

            <div id="loading" class="hidden text-center text-cyan-400 animate-pulse text-xs font-bold">EVOLUINDO MOLECULA...</div>
            <div id="display" class="space-y-4"></div>
        </div>
    </div>

    <script>
        async function executar() {
            const display = document.getElementById('display');
            const btn = document.getElementById('btn');
            const loading = document.getElementById('loading');
            
            display.innerHTML = '';
            loading.classList.remove('hidden');
            btn.disabled = true;

            try {
                // SUBSTITUA A URL ABAIXO PELA URL DO SEU CODESPACE (PORTA 8000)
                const URL_API = 'COLE_AQUI_A_URL_DO_GITHUB/api/v1/descobrir';
                
                const res = await fetch(URL_API, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        projeto: document.getElementById('proj').value,
                        sequencia_custom: document.getElementById('alvo').value,
                        rota: document.getElementById('rota').value
                    })
                });

                const data = await res.json();

                // Card de Economia
                display.innerHTML = `
                    <div class="bg-emerald-500/10 border border-emerald-500/50 p-4 rounded-2xl mt-4">
                        <p class="text-[10px] text-emerald-500 font-bold uppercase">Economia Gerada</p>
                        <p class="text-2xl font-black text-emerald-400">${data.economia.poupado}</p>
                        <p class="text-xs text-cyan-500">${data.economia.tempo} evitadas de P&D</p>
                    </div>
                `;

                // Ranking
                data.ranking.forEach(item => {
                    display.innerHTML += `
                        <div class="bg-black/40 p-4 rounded-2xl border-l-4 border-cyan-500 animate-fadeIn">
                            <div class="flex justify-between text-[10px] mb-2 font-bold uppercase text-slate-500">
                                <span>Rank #${item.rank}</span>
                                <span>Shannon-Model</span>
                            </div>
                            <p class="font-mono text-sm text-emerald-400 font-bold break-all mb-3">${item.sequencia}</p>
                            <div class="grid grid-cols-3 gap-2 text-[9px] text-center font-bold">
                                <div><p class="text-slate-600">ENTROPIA</p><p class="text-white">${item.entropia}</p></div>
                                <div><p class="text-slate-600">LOGP</p><p class="text-white">${item.logp}</p></div>
                                <div><p class="text-slate-600">VIDA</p><p class="text-cyan-400">${item.vida}</p></div>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                display.innerHTML = '<div class="text-red-500 text-center text-xs p-4">Erro: Verifique se o Motor está em Public na aba Ports.</div>';
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
